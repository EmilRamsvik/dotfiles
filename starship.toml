# ============================================================================
# Starship Prompt Configuration
# ============================================================================
# Location (symlinked by setup.sh): ~/.config/starship.toml
# Uses the brand palette (Grå/Oransje/Gul/Blå/Off-white) — matches the
# systek-dark Ghostty theme.
# ============================================================================

add_newline = true
palette = "systek"

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$terraform\
$docker_context\
$cmd_duration
$character"""

[palettes.systek]
gray = "#1A1A1A"
orange = "#FF8C45"
yellow = "#FFD24C"
blue = "#97D2EC"
offwhite = "#FCF6EE"
warmgray = "#5C574F"
coral = "#E5604C"
sage = "#A9C47F"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
style = "bold orange"
symbol = " "
format = "on [$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
style = "sage"
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
style = "sage"
symbol = " "
format = "[$symbol($version )]($style)"
# Only show when the project actually uses node
detect_files = ["package.json", ".node-version", ".nvmrc"]

[terraform]
style = "warmgray"
format = "[$symbol$workspace]($style) "

[docker_context]
style = "blue"
symbol = " "
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 2000
style = "yellow"
format = "took [$duration]($style)"

[character]
success_symbol = "[❯](bold orange)"
error_symbol = "[❯](bold coral)"
vimcmd_symbol = "[❮](bold blue)"
