name: Check karabiner.edn

on:
  pull_request:
    paths:
      - "Karabiner/**"
      - ".github/workflows/karabiner-check.yml"
  push:
    branches: [master]
    paths:
      - "Karabiner/**"
      - ".github/workflows/karabiner-check.yml"

jobs:
  goku-dry-run:
    name: Compile karabiner.edn with goku
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install goku
        run: brew install yqrashawn/goku/goku

      - name: Compile edn
        run: |
          # goku merges into an existing karabiner.json profile, so give it a
          # minimal one to merge into on the runner.
          mkdir -p ~/.config/karabiner
          echo '{"profiles":[{"name":"Default","complex_modifications":{"rules":[]}}]}' \
            > ~/.config/karabiner/karabiner.json
          # goku reads ~/.config/karabiner.edn by default (the env var it honors
          # is GOKU_EDN_CONFIG_FILE, not GOKU_EDN_FILE), so put the file there.
          cp "${GITHUB_WORKSPACE}/Karabiner/karabiner.edn" ~/.config/karabiner.edn
          # Not --dry-run: goku's dry-run always exits 1 after printing the
          # config, so it can't be used as a pass/fail check. A real run exits
          # 0 on success and writes the compiled rules into karabiner.json.
          goku
          jq -e '.profiles[0].complex_modifications.rules | length > 0' \
            ~/.config/karabiner/karabiner.json
