name: Check karabiner.edn

on:
  pull_request:
    paths:
      - "Karabiner/**"
      - ".github/workflows/karabiner-check.yml"
  push:
    branches: [master]
    paths:
      - "Karabiner/**"
      - ".github/workflows/karabiner-check.yml"

jobs:
  goku-dry-run:
    name: Compile karabiner.edn with goku
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install goku
        run: brew install yqrashawn/goku/goku

      - name: Compile edn
        run: |
          # goku reads ~/.config/karabiner.edn and merges into an existing
          # karabiner.json profile, so stage both at their default paths.
          # Note: not --dry-run — goku exits 1 after a successful dry run by
          # design, so only a real run has meaningful exit codes.
          mkdir -p ~/.config/karabiner
          cp "${GITHUB_WORKSPACE}/Karabiner/karabiner.edn" ~/.config/karabiner.edn
          echo '{"profiles":[{"name":"Default","complex_modifications":{"rules":[]}}]}' \
            > ~/.config/karabiner/karabiner.json
          goku
          # sanity-check the generated output is valid JSON
          python3 -m json.tool ~/.config/karabiner/karabiner.json > /dev/null
          echo "karabiner.edn compiled successfully"
